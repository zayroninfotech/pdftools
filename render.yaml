services:
  - type: web
    name: zayron_pdftools
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn pdftools.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_NAME
        value: pdftools
